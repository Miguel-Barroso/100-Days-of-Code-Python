<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add Book</title>
  </head>
  <body>
    <form action="{{ url_for('add') }}" method="POST">
      <label>Book Name</label>
      <input type="text" name="title" placeholder="Title" value="{{ request.form['title'] }}" />
      <label>Book Author</label>
      <input type="text" name="author" placeholder="Author" value="{{ request.form['author'] }}"/>
      <label>Rating</label>
      <input type="text" name="rating" placeholder="Rating" value="{{ request.form['rating'] }}"/>
      <button type="submit">Add Book</button>
    </form>
  <div class="content">
      {% for message in get_flashed_messages() %}
        <div class="alert" style="color:#970020; padding:20px; margin: 5px; background-color: #ffd5de;">{{ message }} </div>
      {% endfor %}
  </div>
  </body>
</html>
